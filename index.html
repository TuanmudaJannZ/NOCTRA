<html lang="id" data-theme="dark">

  <title>AURA — Music Player</title>

<body>
  <!-- DROP OVERLAY -->
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-content">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <p>Drop MP3 files here</p>
    </div>
  </div>

  <!-- FULLSCREEN PLAYER -->
  <div class="fullscreen-player" id="fullscreenPlayer">
    <div class="fs-bg" id="fsBg"></div>
    <button class="fs-close" id="fsClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>

      <div class="fs-cover-wrap">
        <div class="fs-cover" id="fsCover"></div>
        <div class="fs-visualizer" id="fsVisualizer"></div>

        <h1 class="fs-title" id="fsTitle">—</h1>
        <p class="fs-artist" id="fsArtist">Select a track</p>
      </div>
      <div class="fs-controls">
        <div class="fs-progress-wrap">
          <span class="fs-time" id="fsCurrent">0:00</span>
          <div class="fs-progress" id="fsProgress">

            <div class="fs-progress-thumb" id="fsProgressThumb"></div>
          </div>
          <span class="fs-time" id="fsDuration">0:00</span>
        </div>
        <div class="fs-btns">
          <button class="ctrl-btn" id="fsShuffleBtn" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
          </button>
          <button class="ctrl-btn" id="fsPrevBtn" title="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="ctrl-btn play-btn" id="fsPlayBtn" title="Play/Pause">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="ctrl-btn" id="fsNextBtn" title="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
          <button class="ctrl-btn" id="fsRepeatBtn" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          </button>
        </div>
        <div class="fs-vol">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
          <input type="range" class="vol-slider" id="fsVolSlider" min="0" max="1" step="0.01" value="1" />
        </div>
      </div>
    </div>
  </div>
